  # ── Custom Rules (Semgrep) ─────────────────────────────
  semgrep:
    name: Semgrep — Custom Security Rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: .semgrep.yml
        env:
          SEMGREP_RULES: >-
            p/java
            p/owasp-top-ten
            p/jwt

