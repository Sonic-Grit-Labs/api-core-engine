name: Security Checks

on:
  push:
    branches: [main, testing, development]
  pull_request:
    branches: [main, testing, development]

permissions:
  contents: read
  security-events: write

concurrency:
  group: "security-${{ github.ref }}"
  cancel-in-progress: true

